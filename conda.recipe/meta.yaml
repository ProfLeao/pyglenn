{% set name = "pyglenn" %}
{% set version = "0.1.7rc4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - pyglenn = pyglenn.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64.0
    - wheel
  run:
    - python >=3.9

test:
  imports:
    - pyglenn
    - pyglenn.calculator
    - pyglenn.database
    - pyglenn.builder
  commands:
    - pyglenn --help

about:
  home: https://github.com/ProfLeao/pyglenn
  license: MIT
  license_file: LICENSE
  summary: >
    Thermochemical properties calculator — computes Cp(T), H°(T), S°(T)
    from NASA polynomial coefficients stored in SQLite.
  description: >
    pyglenn is a Python package for calculating thermochemical properties
    (heat capacity, enthalpy, entropy) of chemical species using NASA-7
    polynomial coefficients.  It converts FORTRAN thermo.inp files into
    a normalized SQLite3 database and provides both a Python API and a
    command-line interface.

extra:
  recipe-maintainers:
    - profr
