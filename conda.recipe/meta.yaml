{% set name = "pythermo" %}
{% set version = "1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - pythermo = pythermo.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64.0
    - wheel
  run:
    - python >=3.9

test:
  imports:
    - pythermo
    - pythermo.calculator
    - pythermo.database
    - pythermo.builder
  commands:
    - pythermo --help

about:
  home: https://github.com/profr/pyglenn_novo
  license: MIT
  license_file: LICENSE
  summary: >
    Thermochemical properties calculator — computes Cp(T), H°(T), S°(T)
    from NASA polynomial coefficients stored in SQLite.
  description: >
    pythermo is a Python package for calculating thermochemical properties
    (heat capacity, enthalpy, entropy) of chemical species using NASA-7
    polynomial coefficients.  It converts FORTRAN thermo.inp files into
    a normalized SQLite3 database and provides both a Python API and a
    command-line interface.

extra:
  recipe-maintainers:
    - profr
